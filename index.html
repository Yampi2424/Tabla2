<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Liga Dávila Carlson</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== VARIABLES ===== */
:root {
  --morado: #5B2A86;
  --dorado: #D4AF37;
  --negro: #0b0b0f;
  --blanco: #ffffff;
  --gris: #1c1c1c;
}

/* ===== GENERAL ===== */
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: var(--negro);
  color: var(--blanco);
  padding: 8px;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(90deg, var(--morado), var(--negro));
  padding: 12px;
  border-radius: 12px;
  border: 2px solid var(--dorado);
}

.logo-liga {
  width: 50px;
  height: 50px;
  object-fit: contain;
}

/* ===== SERIES ===== */
.series {
  display: flex;
  gap: 8px;
  overflow-x: auto;
}

.serie-btn {
  background: var(--gris);
  padding: 8px 14px;
  border-radius: 999px;
  cursor: pointer;
}

.serie-btn.active {
  background: var(--dorado);
  color: black;
}

/* ===== TABLA ===== */
.tabla-container {
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 650px;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  text-align: center;
}

.club {
  display: flex;
  align-items: center;
  gap: 6px;
}

.logo-equipo {
  width: 26px;
  height: 26px;
}

/* ===== FECHAS ===== */
.fecha-btn {
  width: 100%;
  padding: 10px;
  background: var(--morado);
  border: none;
  color: white;
  margin-top: 10px;
}

.fecha-contenido {
  display: none;
  padding: 10px;
}

</style>
</head>

<body>

<div class="header">
  <img src="https://i.imgur.com/zy9TaG1.jpeg" class="logo-liga">
  <div>
    <h1>Liga Dávila Carlson</h1>
    <p>Apertura 2026</p>
  </div>
</div>

<div class="series" id="series"></div>

<div class="tabla-container">
<table>
<thead>
<tr>
<th>#</th>
<th>Equipo</th>
<th>PJ</th>
<th>G</th>
<th>E</th>
<th>P</th>
<th>GF</th>
<th>GC</th>
<th>DG</th>
<th>PTS</th>
</tr>
</thead>
<tbody id="tabla-body"></tbody>
</table>
</div>

<div id="fechasContainer"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOHkkkQsDMcL9OxXjKg9YMcC6xM7kke1Q",
  authDomain: "liga-davila.firebaseapp.com",
  projectId: "liga-davila"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SERIES = ["Sub-13","Sub-15","Sub-17","Primera","Segunda","Senior"];
let serieActual = "Sub-13";

function crearBotones() {
  const cont = document.getElementById("series");

  SERIES.forEach((serie, i) => {
    const btn = document.createElement("div");
    btn.className = "serie-btn";
    btn.innerText = serie;

    if (i === 0) btn.classList.add("active");

    btn.onclick = () => {
      serieActual = serie;
      document.querySelectorAll(".serie-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      cargarTabla();
    };

    cont.appendChild(btn);
  });
}

function cargarTabla() {

  onSnapshot(collection(db, "partidos"), async (snapshot) => {

    const equiposSnap = await getDocs(collection(db, "equipos"));

    let tabla = {};

    equiposSnap.forEach(doc => {
      const e = doc.data();

      if (e.serie === serieActual) {
        tabla[e.nombre] = {
          nombre: e.nombre,
          PJ: 0, G: 0, E: 0, P: 0,
          GF: 0, GC: 0, PTS: 0
        };
      }
    });

    let partidos = [];
    snapshot.forEach(doc => partidos.push(doc.data()));

    partidos.forEach(p => {

      if (p.serie !== serieActual) return;

      const A = tabla[p.equipoA];
      const B = tabla[p.equipoB];

      if (!A || !B) return;

      A.PJ++; B.PJ++;

      A.GF += p.ga;
      A.GC += p.gb;

      B.GF += p.gb;
      B.GC += p.ga;

      if (p.ga > p.gb) {
        A.G++; A.PTS += 3;
        B.P++;
      } else if (p.ga < p.gb) {
        B.G++; B.PTS += 3;
        A.P++;
      } else {
        A.E++; B.E++;
        A.PTS++; B.PTS++;
      }
    });

    let lista = Object.values(tabla);

    lista.sort((a, b) => b.PTS - a.PTS);

    mostrarTabla(lista);
    mostrarFechas(partidos);
  });
}

function mostrarTabla(lista) {
  const tabla = document.getElementById("tabla-body");
  tabla.innerHTML = "";

  lista.forEach((e, i) => {
    tabla.innerHTML += `
    <tr>
      <td>${i+1}</td>
      <td>${e.nombre}</td>
      <td>${e.PJ}</td>
      <td>${e.G}</td>
      <td>${e.E}</td>
      <td>${e.P}</td>
      <td>${e.GF}</td>
      <td>${e.GC}</td>
      <td>${e.GF - e.GC}</td>
      <td>${e.PTS}</td>
    </tr>`;
  });
}

function mostrarFechas(partidos) {

  const container = document.getElementById("fechasContainer");
  container.innerHTML = "";

  const fechas = {};

  partidos.forEach(p => {
    if (!fechas[p.fecha]) fechas[p.fecha] = [];
    fechas[p.fecha].push(p);
  });

  Object.keys(fechas).forEach(fecha => {

    const div = document.createElement("div");

    div.innerHTML = `
      <button class="fecha-btn" onclick="toggleFecha(${fecha})">
        Fecha ${fecha}
      </button>
      <div class="fecha-contenido" id="fecha-${fecha}">
        ${fechas[fecha].map(p => `
          <div>${p.equipoA} ${p.ga} - ${p.gb} ${p.equipoB}</div>
        `).join("")}
      </div>
    `;

    container.appendChild(div);
  });
}

window.toggleFecha = function(fecha) {
  const el = document.getElementById(`fecha-${fecha}`);
  el.style.display = el.style.display === "block" ? "none" : "block";
};

crearBotones();
cargarTabla();

</script>

</body>
</html>
