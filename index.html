<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Liga Dávila Carlson</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* 🔥 TODO TU CSS IGUAL (NO SE TOCA) */
:root {
  --morado: #5B2A86;
  --dorado: #D4AF37;
  --negro: #0b0b0f;
  --blanco: #ffffff;
  --gris: #1c1c1c;
}

body {
  margin: 0;
  font-family: system-ui, Arial;
  background: var(--negro);
  color: var(--blanco);
  padding: 8px;
}

.header {
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(90deg, var(--morado), var(--negro));
  padding: 12px;
  border-radius: 12px;
  border: 2px solid var(--dorado);
}

.logo-liga {
  width: 50px;
  height: 50px;
  object-fit: contain;
}

.series {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 10px 0;
}

.serie-btn {
  background: var(--gris);
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  cursor: pointer;
}

.serie-btn.active {
  background: var(--dorado);
  color: black;
  font-weight: bold;
}

.tabla-container {
  width: 100%;
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 650px;
  border-collapse: collapse;
  background: #12121a;
}

th, td {
  padding: 8px;
  font-size: 12px;
  text-align: center;
}

.club {
  display: flex;
  align-items: center;
  gap: 6px;
}

.logo-equipo {
  width: 26px;
  height: 26px;
}

.ultimos5 {
  display: flex;
  justify-content: center;
  gap: 4px;
}

.forma {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: white;
}

.win { background: #22c55e; }
.lose { background: #ef4444; }
.draw { background: #9ca3af; }
.empty { background: #2a2a3a; }

</style>
</head>

<body>

<div class="header">
  <img src="https://i.imgur.com/zy9TaG1.jpeg" class="logo-liga">
  <div>
    <h1>Liga Dávila Carlson</h1>
    <p>Apertura 2026</p>
  </div>
</div>

<div class="series" id="series"></div>

<div class="tabla-container">
<table>
<thead>
<tr>
<th>#</th>
<th>Equipo</th>
<th>PJ</th>
<th>G</th>
<th>E</th>
<th>P</th>
<th>GF</th>
<th>GC</th>
<th>DG</th>
<th>PTS</th>
<th>Últimos 5</th>
</tr>
</thead>

<tbody id="tabla-body"></tbody>

</table>
</div>

<!-- 🔥 SOLO ESTO DE JS -->
<script type="module">
  import { iniciarTabla } from "./tabla.js";
  iniciarTabla();
</script>

</body>
</html>
