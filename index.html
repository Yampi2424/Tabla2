<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Liga Dávila Carlson</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

tr:first-child {
  border-left: 4px solid var(--dorado);
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--negro);
  color: var(--blanco);
}

th {
  background: var(--morado);
  color: var(--blanco);
  padding: 10px;
  font-weight: bold;
}

td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

tr:hover {
  background: rgba(255,255,255,0.05);
}

button {
  background: var(--gris);
  color: var(--blanco);
  border: none;
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: var(--morado);
}

button.activo {
  background: var(--dorado);
  color: var(--negro);
  font-weight: bold;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  background: linear-gradient(90deg, var(--morado), var(--negro));
  padding: 15px;
  border-bottom: 3px solid var(--dorado);
}

.logo-liga {
  width: 60px;
  height: 60px;
  object-fit: contain;
}

.header h1 {
  color: var(--blanco);
  margin: 0;
}

.header p {
  color: var(--dorado);
  margin: 0;
  font-size: 14px;
}

:root {
  --morado: #5B2A86;
  --morado-claro: #7B3FB5;
  --dorado: #D4AF37;
  --negro: #0f0f0f;
  --blanco: #ffffff;
  --gris: #1c1c1c;
}

.logo-equipo {
  width: 30px;
  height: 30px;
  object-fit: contain;
  border-radius: 50%;
  background: #0b0b0f;
  padding: 2px;
}

.club {
  display: flex;
  align-items: center;
}

/* ===== GENERAL ===== */
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0b0b0f;
  color: #fff;
}

/* ===== HEADER ===== */
header {
  background: linear-gradient(135deg, #6a00ff, #9d00ff);
  padding: 18px 10px;
  text-align: center;
  box-shadow: 0 4px 20px #000;
}

header h1 {
  margin: 8px 0 0;
  font-size: 18px;
}

/* ===== SERIES ===== */
.series {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 12px;
}
.series::-webkit-scrollbar { display: none; }

.serie-btn {
  background: #1f1f2e;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  cursor: pointer;
}

.serie-btn.active {
  background: linear-gradient(135deg, #6a00ff, #9d00ff);
}

/* ===== TABLA ===== */
.container {
  padding: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #12121a;
  border-radius: 12px;
  overflow: hidden;
}

thead {
  background: #1a1a2a;
}

th {
  font-size: 12px;
  padding: 10px;
  color: #aaa;
}

td {
  padding: 10px;
  font-size: 13px;
}

/* ===== ALINEACIÓN PERFECTA ===== */
th, td {
  text-align: center;
}

/* EXCEPCIONES */
td:first-child {
  text-align: left;
  padding-left: 10px;
  font-weight: bold;
}

td:nth-child(2) {
  text-align: left;
}

/* ANCHOS */
td:nth-child(n+3):nth-child(-n+10) {
  width: 50px;
}

td:last-child {
  width: 150px;
}

/* ===== FILAS ===== */
tr {
  border-bottom: 1px solid #1f1f2a;
}

tr:hover {
  background: #1a1a26;
}

/* ===== CLUB ===== */
.club {
  display: flex;
  align-items: center;
  gap: 8px;
}



/* ===== PODIO ===== */
tr:nth-child(1) td:first-child { color: gold; }
tr:nth-child(2) td:first-child { color: silver; }
tr:nth-child(3) td:first-child { color: #cd7f32; }

/* ===== ÚLTIMOS 5 ===== */
.ultimos5 {
  display: flex;
  justify-content: center;
  gap: 6px;
}

.forma {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: bold;
  color: white;
}

.win { background: #22c55e; }
.lose { background: #ef4444; }
.draw { background: #9ca3af; }
.empty { background: #2a2a3a; }

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  th, td {
    font-size: 11px;
    padding: 6px;
  }
}

</style>
</head>

<body>

<header>
  <div class="header">
  <img src="https://i.imgur.com/zy9TaG1.jpeg" class="logo-liga">
  <div>
    <h1>Liga Dávila Carlson</h1>
    <p>Apertura 2026</p>
  </div>
</div>
</header>

<div class="series" id="series"></div>

<div class="container">
<table>
<thead>
<tr>
<th>#</th>
<th>Equipo</th>
<th>PJ</th>
<th>G</th>
<th>E</th>
<th>P</th>
<th>GF</th>
<th>GC</th>
<th>DG</th>
<th>PTS</th>
<th>Últimos 5</th>
</tr>
</thead>
<tbody id="tabla-body"></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOHkkkQsDMcL9OxXjKg9YMcC6xM7kke1Q",
  authDomain: "liga-davila.firebaseapp.com",
  projectId: "liga-davila",
  storageBucket: "liga-davila.firebasestorage.app",
  messagingSenderId: "674533365203",
  appId: "1:674533365203:web:841cbe1f23f1efb6230b26"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SERIES = ["Sub-13","Sub-15","Sub-17","Primera","Segunda","Senior"];
let serieActual = "Sub-13";

function crearBotones() {
  const cont = document.getElementById("series");

  SERIES.forEach((serie, i) => {
    const btn = document.createElement("div");
    btn.className = "serie-btn";
    btn.innerText = serie;

    if (i === 0) btn.classList.add("active");

    btn.onclick = () => {
      serieActual = serie;
      document.querySelectorAll(".serie-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      cargarTabla();
    };

    cont.appendChild(btn);
  });
}

async function cargarTabla() {

  const equiposSnap = await getDocs(collection(db, "equipos"));
  const partidosSnap = await getDocs(collection(db, "partidos"));

  let tabla = {};

  equiposSnap.forEach(doc => {
    const e = doc.data();

    if (e.serie === serieActual) {
      tabla[e.nombre] = {
        nombre: e.nombre,
        logo: e.logo || "https://via.placeholder.com/30",
        color: e.color || "#ffffff",
        PJ: 0, G: 0, E: 0, P: 0,
        GF: 0, GC: 0, PTS: 0,
        forma: []
      };
    }
  });

  let partidos = [];
  partidosSnap.forEach(doc => partidos.push(doc.data()));

  partidos.sort((a, b) => a.fecha - b.fecha);

  partidos.forEach(p => {

    if (p.serie !== serieActual) return;

    const A = tabla[p.equipoA];
    const B = tabla[p.equipoB];

    if (!A || !B) return;

    A.PJ++; B.PJ++;

    A.GF += p.ga;
    A.GC += p.gb;

    B.GF += p.gb;
    B.GC += p.ga;

    if (p.ga > p.gb) {
      A.G++; A.PTS += 3;
      B.P++;
      A.forma.push("✅");
      B.forma.push("❌");

    } else if (p.ga < p.gb) {
      B.G++; B.PTS += 3;
      A.P++;
      B.forma.push("✅");
      A.forma.push("❌");

    } else {
      A.E++; B.E++;
      A.PTS++; B.PTS++;
      A.forma.push("➖");
      B.forma.push("➖");
    }

    if (A.forma.length > 5) A.forma.shift();
    if (B.forma.length > 5) B.forma.shift();
  });

  let lista = Object.values(tabla);

  lista.sort((a, b) =>
    b.PTS - a.PTS ||
    (b.GF - b.GC) - (a.GF - a.GC)
  );

  mostrarTabla(lista);
}

function mostrarTabla(lista) {
  const tabla = document.getElementById("tabla-body");
  tabla.innerHTML = "";

  lista.forEach((e, i) => {

    while (e.forma.length < 5) e.forma.push("");

    tabla.innerHTML += `
    <tr>
      <td>${i+1}</td>
<td class="club">
  <img src="${e.logo}" class="logo-equipo">
  <span style="color:${e.color}">${e.nombre}</span>
</td>
      <td>${e.PJ}</td>
      <td>${e.G}</td>
      <td>${e.E}</td>
      <td>${e.P}</td>
      <td>${e.GF}</td>
      <td>${e.GC}</td>
      <td>${e.GF - e.GC}</td>
      <td><b>${e.PTS}</b></td>
      <td>
        <div class="ultimos5">
          ${e.forma.map(f => {
            if (f === "✅") return `<div class="forma win">✓</div>`;
            if (f === "❌") return `<div class="forma lose">✕</div>`;
            if (f === "➖") return `<div class="forma draw">-</div>`;
            return `<div class="forma empty"></div>`;
          }).join("")}
        </div>
      </td>
    </tr>
    `;
  });
}

crearBotones();
cargarTabla();

</script>

</body>
</html>
