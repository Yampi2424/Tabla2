<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Liga Dávila Carlson</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

  .fecha-btn {
  width: 100%;
  padding: 12px;
  background: var(--morado);
  color: white;
  border: none;
  margin-top: 10px;
  border-radius: 8px;
  font-weight: bold;
}

.fecha-contenido {
  display: none;
  padding: 10px;
  background: #111;
  border-radius: 8px;
}

.partido {
  padding: 6px;
  border-bottom: 1px solid #333;
}

/* ===== VARIABLES ===== */
:root {
  --morado: #5B2A86;
  --dorado: #D4AF37;
  --negro: #0b0b0f;
  --blanco: #ffffff;
  --gris: #1c1c1c;
}

/* ===== GENERAL ===== */
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: var(--negro);
  color: var(--blanco);
  padding: 8px;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(90deg, var(--morado), var(--negro));
  padding: 12px;
  border-radius: 12px;
  border: 2px solid var(--dorado);
}

.logo-liga {
  width: 50px;
  height: 50px;
  object-fit: contain;
}

.header h1 {
  margin: 0;
  font-size: 16px;
}

.header p {
  margin: 0;
  font-size: 13px;
  color: var(--dorado);
}

/* ===== SERIES ===== */
.series {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 10px 0;
}
.series::-webkit-scrollbar { display: none; }

.serie-btn {
  background: var(--gris);
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}

.serie-btn.active {
  background: var(--dorado);
  color: black;
  font-weight: bold;
}

/* ===== CONTENEDOR TABLA 🔥 ===== */
.tabla-container {
  width: 100%;
  overflow-x: auto;
}

/* ===== TABLA ===== */
table {
  width: 100%;
  min-width: 650px; /* 🔥 CLAVE: evita que se corte */
  border-collapse: collapse;
  background: #12121a;
  border-radius: 12px;
  overflow: hidden;
}

thead {
  background: var(--morado);
}

th, td {
  padding: 8px;
  font-size: 12px;
  text-align: center;
}

/* EXCEPCIONES */
td:first-child {
  text-align: left;
  font-weight: bold;
}

td:nth-child(2) {
  text-align: left;
}

/* ===== CLUB ===== */
.club {
  display: flex;
  align-items: center;
  gap: 6px;
}

.logo-equipo {
  width: 26px;
  height: 26px;
  object-fit: contain;
  border-radius: 50%;
  background: #000;
}

/* ===== FILAS ===== */
tr {
  border-bottom: 1px solid #1f1f2a;
}

tr:hover {
  background: #1a1a26;
}

/* ===== PODIO ===== */
tr:nth-child(1) td:first-child { color: gold; }
tr:nth-child(2) td:first-child { color: silver; }
tr:nth-child(3) td:first-child { color: #cd7f32; }

/* ===== ÚLTIMOS 5 ===== */
.ultimos5 {
  display: flex;
  justify-content: center;
  gap: 4px;
  min-width: 90px; /* 🔥 CLAVE */
}

.forma {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: bold;
  color: white;
}

.win { background: #22c55e; }
.lose { background: #ef4444; }
.draw { background: #9ca3af; }
.empty { background: #2a2a3a; }

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  th, td {
    font-size: 10px;
    padding: 6px;
  }

  .header h1 {
    font-size: 14px;
  }

  .header p {
    font-size: 12px;
  }
}

</style>
</head>

<body>

<div class="header">
  <img src="https://i.imgur.com/zy9TaG1.jpeg" class="logo-liga">
  <div>
    <h1>Liga Dávila Carlson</h1>
    <p>Apertura 2026</p>
  </div>
</div>

<div class="series" id="series"></div>

<div class="tabla-container">
<table>
<thead>
<tr>
<th>#</th>
<th>Equipo</th>
<th>PJ</th>
<th>G</th>
<th>E</th>
<th>P</th>
<th>GF</th>
<th>GC</th>
<th>DG</th>
<th>PTS</th>
<th>Últimos 5</th>
</tr>
</thead>
<tbody id="tabla-body"></tbody>
</table>
</div>

<div id="fechasContainer"></div>

<script type="module">
/* (resto igual al original que enviaste) */
</script>

</body>
</html>
